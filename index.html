<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRRA · 亲密关系风险评估</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a;
    --bg2: #161310;
    --surface: #1c1915;
    --surface2: #242019;
    --border: #2e2a22;
    --border-light: #3d3830;
    --gold: #c9a84c;
    --gold-dim: #8a6f30;
    --gold-glow: rgba(201,168,76,0.12);
    --cream: #e8dcc8;
    --cream-dim: #a89880;
    --text: #d4c9b5;
    --text-dim: #7a6e5e;
    --red: #c24b3a;
    --red-dim: #7a2f22;
    --accent: #9b7fa8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(201,168,76,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(155,127,168,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── COVER ── */
  #cover {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .cover-tag {
    font-family: 'DM Serif Display', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
  }

  .cover-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(48px, 8vw, 88px);
    color: var(--cream);
    line-height: 1;
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp 0.8s 0.4s forwards;
    letter-spacing: -0.02em;
  }

  .cover-title span {
    color: var(--gold);
    font-style: italic;
  }

  .cover-sub {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeUp 0.8s 0.6s forwards;
  }

  .cover-divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, var(--gold-dim), transparent);
    margin: 0 auto 40px;
    opacity: 0;
    animation: fadeUp 0.8s 0.7s forwards;
  }

  .cover-desc {
    max-width: 480px;
    font-size: 14px;
    line-height: 2;
    color: var(--cream-dim);
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeUp 0.8s 0.8s forwards;
  }

  .cover-meta {
    display: flex;
    gap: 40px;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeUp 0.8s 0.9s forwards;
  }

  .meta-item {
    text-align: center;
  }

  .meta-num {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--gold);
    display: block;
  }

  .meta-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    margin-top: 4px;
    display: block;
  }

  .btn-start {
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    padding: 16px 48px;
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.3s;
    opacity: 0;
    animation: fadeUp 0.8s 1s forwards;
    position: relative;
    overflow: hidden;
  }

  .btn-start::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold-glow);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn-start:hover { border-color: var(--gold); }
  .btn-start:hover::before { opacity: 1; }

  .cover-warning {
    margin-top: 40px;
    font-size: 11px;
    color: var(--text-dim);
    max-width: 360px;
    line-height: 1.8;
    opacity: 0;
    animation: fadeUp 0.8s 1.1s forwards;
  }

  /* ── QUIZ ── */
  #quiz { display: none; min-height: 100vh; position: relative; z-index: 1; }

  .quiz-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: rgba(14,12,10,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    z-index: 100;
  }

  .quiz-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  .quiz-progress-wrap {
    flex: 1;
    margin: 0 32px;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    position: relative;
  }

  .quiz-progress-bar {
    height: 100%;
    background: linear-gradient(to right, var(--gold-dim), var(--gold));
    border-radius: 1px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 8px rgba(201,168,76,0.4);
  }

  .quiz-counter {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .quiz-body {
    max-width: 720px;
    margin: 0 auto;
    padding: 100px 24px 80px;
  }

  .q-module {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 20px;
    font-family: 'DM Serif Display', serif;
  }

  .q-context {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--gold-dim);
    padding: 16px 20px;
    margin-bottom: 28px;
    font-size: 13px;
    color: var(--cream-dim);
    line-height: 1.8;
    font-style: italic;
  }

  .q-text {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(17px, 3vw, 22px);
    line-height: 1.7;
    color: var(--cream);
    margin-bottom: 36px;
    font-weight: 300;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px 24px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    text-align: left;
    position: relative;
    overflow: hidden;
  }

  .option::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold-glow);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .option:hover {
    border-color: var(--border-light);
  }

  .option:hover::before { opacity: 1; }

  .option.selected {
    border-color: var(--gold-dim);
    background: var(--surface2);
  }

  .option.selected::before { opacity: 1; }

  .opt-letter {
    width: 26px;
    height: 26px;
    border: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    color: var(--text-dim);
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .option.selected .opt-letter {
    border-color: var(--gold);
    color: var(--gold);
  }

  .opt-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    padding-top: 4px;
  }

  .quiz-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 44px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
  }

  .btn-nav {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-dim);
    padding: 10px 28px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans SC', sans-serif;
    letter-spacing: 0.1em;
  }

  .btn-nav:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  .btn-nav:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .btn-next {
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  .btn-next:hover {
    border-color: var(--gold) !important;
    background: var(--gold-glow);
    color: var(--gold) !important;
  }

  .btn-next:disabled {
    opacity: 0.25;
  }

  /* ── RESULT ── */
  #result { display: none; position: relative; z-index: 1; }

  .result-hero {
    min-height: 50vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px 48px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  .result-tag {
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--text-dim);
    margin-bottom: 24px;
    font-family: 'DM Serif Display', serif;
    text-transform: uppercase;
  }

  .result-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(36px, 6vw, 64px);
    line-height: 1.1;
    margin-bottom: 16px;
  }

  .result-score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid var(--gold-dim);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 28px auto;
    position: relative;
  }

  .result-score-circle::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 50%;
    background: conic-gradient(var(--gold) var(--pct), transparent var(--pct));
    -webkit-mask: radial-gradient(farthest-side, transparent 55%, black 56%);
    mask: radial-gradient(farthest-side, transparent 55%, black 56%);
    opacity: 0.6;
  }

  .score-num {
    font-family: 'DM Serif Display', serif;
    font-size: 40px;
    color: var(--gold);
    line-height: 1;
  }

  .score-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    margin-top: 2px;
  }

  .result-subtitle {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    color: var(--cream);
    margin-top: 8px;
  }

  .result-body {
    max-width: 800px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }

  .result-section {
    margin-bottom: 56px;
  }

  .result-section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* Radar chart */
  .chart-wrap {
    display: flex;
    justify-content: center;
    margin: 32px 0;
  }

  svg.radar { overflow: visible; }

  /* Dimension bars */
  .dim-bars { display: flex; flex-direction: column; gap: 14px; }

  .dim-row {
    display: grid;
    grid-template-columns: 160px 1fr 40px;
    align-items: center;
    gap: 16px;
  }

  .dim-name {
    font-size: 12px;
    color: var(--cream-dim);
    text-align: right;
    letter-spacing: 0.05em;
  }

  .dim-bar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .dim-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(to right, var(--gold-dim), var(--gold));
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
  }

  .dim-val {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    color: var(--text-dim);
  }

  /* Narrative */
  .narrative-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--gold-dim);
    padding: 28px 32px;
    margin-bottom: 20px;
    line-height: 1.9;
    font-size: 14px;
    color: var(--text);
  }

  .narrative-block h4 {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    color: var(--cream);
    margin-bottom: 12px;
    font-weight: 400;
  }

  /* Risk paths */
  .risk-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border: 1px solid var(--red-dim);
    background: rgba(194,75,58,0.08);
    font-size: 12px;
    color: #d4705e;
    margin: 4px;
    letter-spacing: 0.05em;
  }

  .strength-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border: 1px solid var(--gold-dim);
    background: var(--gold-glow);
    font-size: 12px;
    color: var(--gold);
    margin: 4px;
    letter-spacing: 0.05em;
  }

  .conclusion-box {
    background: var(--surface2);
    border: 1px solid var(--border-light);
    padding: 36px;
    line-height: 2;
    font-size: 14px;
    color: var(--text);
  }

  .conclusion-box p { margin-bottom: 16px; }
  .conclusion-box p:last-child { margin-bottom: 0; }

  .result-restart {
    text-align: center;
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeUp 0.5s forwards; }

  @media (max-width: 600px) {
    .dim-row { grid-template-columns: 110px 1fr 30px; }
    .dim-name { font-size: 11px; }
    .quiz-header { padding: 0 16px; }
  }
</style>
</head>
<body>

<!-- COVER -->
<section id="cover">
  <div class="cover-tag">Intimate Relationship Risk Architecture · v0.2</div>
  <div class="cover-title">IRRA<br><span>亲密关系</span></div>
  <div class="cover-sub">人格风险结构评估系统</div>
  <div class="cover-divider"></div>
  <div class="cover-desc">
    这不是测试你的伴侣——<br>
    而是测试你在长期亲密关系中真实的人格走向。<br>
    没有明显的好坏之分。请凭直觉作答。
  </div>
  <div class="cover-meta">
    <div class="meta-item">
      <span class="meta-num">40</span>
      <span class="meta-label">题目</span>
    </div>
    <div class="meta-item">
      <span class="meta-num">8</span>
      <span class="meta-label">核心维度</span>
    </div>
    <div class="meta-item">
      <span class="meta-num">15'</span>
      <span class="meta-label">预计时长</span>
    </div>
  </div>
  <button class="btn-start" onclick="startQuiz()">开始评估</button>
  <div class="cover-warning">
    本测评基于依恋理论、羞耻动力学、客体关系理论等心理学框架，<br>
    仅供自我探索参考，不构成诊断。
  </div>
</section>

<!-- QUIZ -->
<section id="quiz">
  <div class="quiz-header">
    <div class="quiz-logo">IRRA</div>
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="quiz-counter" id="counter">1 / 40</div>
  </div>
  <div class="quiz-body" id="quizBody"></div>
</section>

<!-- RESULT -->
<section id="result">
  <div class="result-hero">
    <div class="result-tag">IRRA · 评估报告</div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-score-circle" id="scoreCircle">
      <div class="score-num" id="scoreNum">—</div>
      <div class="score-label">综合风险指数</div>
    </div>
    <div class="result-subtitle" id="resultSubtitle"></div>
  </div>
  <div class="result-body">
    <div class="result-section">
      <div class="result-section-title">维度雷达图</div>
      <div class="chart-wrap" id="radarWrap"></div>
    </div>
    <div class="result-section">
      <div class="result-section-title">八大维度得分</div>
      <div class="dim-bars" id="dimBars"></div>
    </div>
    <div class="result-section">
      <div class="result-section-title">人格风险路径</div>
      <div id="riskPaths"></div>
    </div>
    <div class="result-section">
      <div class="result-section-title">详细分析</div>
      <div id="narrativeBlocks"></div>
    </div>
    <div class="result-section">
      <div class="result-section-title">综合结论</div>
      <div class="conclusion-box" id="conclusionBox"></div>
    </div>
    <div class="result-restart">
      <button class="btn-start" onclick="restartQuiz()">重新测试</button>
      <button class="btn-start btn-share" onclick="submitResult()" style="margin-top:16px;background:linear-gradient(135deg,var(--gold-dim),var(--gold))">提交并生成分享链接</button>
      <div id="shareLink" style="display:none;margin-top:20px;padding:16px;background:var(--surface2);border-radius:12px;border:1px solid var(--border)">
        <p style="color:var(--cream);font-size:14px;margin-bottom:8px">你的结果链接：</p>
        <input type="text" id="shareUrl" readonly style="width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--gold);font-size:13px;cursor:pointer" onclick="this.select();document.execCommand('copy')">
        <p style="color:var(--text-dim);font-size:12px;margin-top:8px">点击链接可复制，分享给别人即可</p>
      </div>
    </div>
  </div>
</section>

<script>
// ── QUESTION BANK ──────────────────────────────────────────────────────────
// Dimensions: control, shame, aggression, differentiation,
//             emotionalAvailability, splitting, abandonmentFear, repair

const questions = [
  // ── 结构1：隐性权力结构 ──
  // 1. 显性控制
  {
    module: "权力结构",
    text: "伴侣做了一个你不同意的决定（比如换工作、买大件东西），你会？",
    options: [
      { text: "尊重他/她的决定，这是他/她的人生", w: {control:0, differentiation:2} },
      { text: "会表达我的看法，但最终由他/她决定", w: {control:1, differentiation:1} },
      { text: "会反复劝说，直到他/她改变主意", w: {control:3, differentiation:-1} },
      { text: "会觉得他/她不听我的就是不重视这段关系", w: {control:4, splitting:1, abandonment:1} }
    ]
  },
  // 2. 隐性控制
  {
    module: "权力结构",
    text: "你觉得伴侣某个习惯不好（比如熬夜、吃垃圾食品），你会？",
    options: [
      { text: "提一次建议，然后尊重他/她的选择", w: {control:0, differentiation:2} },
      { text: "会经常提醒，因为我真的很在意他/她的健康", w: {control:2, emotionalAvailability:1} },
      { text: "会帮他/她安排好作息，告诉他/她应该怎么做", w: {control:3, differentiation:-1} },
      { text: "如果他/她不改，我会觉得他/她不够爱我", w: {control:4, conditionalLove:2, splitting:1} }
    ]
  },
  // 3. 被需要感依赖
  {
    module: "权力结构",
    text: "伴侣开始变得更加独立，很多事情不再需要你的帮助。你感觉到的是？",
    options: [
      { text: "为他/她感到高兴，这是好事", w: {control:0, differentiation:2} },
      { text: "欣慰，但也有一点不知道自己的位置在哪里", w: {control:1, emotionalAvailability:1} },
      { text: "有点失落，觉得被'需要'让我很有安全感", w: {control:2, abandonmentFear:2} },
      { text: "感到不安，开始想对方是不是不再需要这段关系了", w: {control:3, abandonmentFear:3, splitting:1} }
    ]
  },
  // 4. 边界侵蚀
  {
    module: "权力结构",
    text: "伴侣想保留一些个人隐私（比如不告诉你手机密码、不分享所有社交账号）。你的感受是？",
    options: [
      { text: "完全理解，每个人都需要私人空间", w: {control:0, differentiation:2} },
      { text: "能接受，但希望他/她不会对我隐瞒重要的事", w: {control:1, differentiation:1} },
      { text: "会有点不安，想知道他/她在隐瞒什么", w: {control:2, abandonmentFear:2} },
      { text: "会觉得如果他/她真的爱我，就不应该有秘密", w: {control:4, differentiation:-1, splitting:1} }
    ]
  },

  // ── 结构2：羞耻-防御系统 ──
  // 5. 羞耻防御强度

// ── STATE ─────────────────────────────────────────────────────────────────
let current = 0;
let answers = new Array(questions.length).fill(null);
const TOTAL = questions.length;

// ── NAVIGATION ────────────────────────────────────────────────────────────
function startQuiz() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function restartQuiz() {
  current = 0;
  answers = new Array(TOTAL).fill(null);
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const pct = ((current) / TOTAL * 100).toFixed(1);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('counter').textContent = `${current + 1} / ${TOTAL}`;

  const body = document.getElementById('quizBody');
  body.innerHTML = `
    <div class="q-module fade-in">${q.module}</div>
    ${q.context ? `<div class="q-context fade-in">${q.context}</div>` : ''}
    <div class="q-text fade-in">${q.text}</div>
    <div class="options" id="optionList"></div>
    <div class="quiz-nav">
      <button class="btn-nav" onclick="goBack()" ${current === 0 ? 'disabled' : ''}>← 上一题</button>
      <button class="btn-nav btn-next" id="btnNext" onclick="goNext()" disabled>
        ${current === TOTAL - 1 ? '查看结果 →' : '下一题 →'}
      </button>
    </div>
  `;

  const letters = ['A','B','C','D'];
  const ol = document.getElementById('optionList');
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (answers[current] === i ? ' selected' : '');
    div.innerHTML = `<div class="opt-letter">${letters[i]}</div><div class="opt-text">${opt.text}</div>`;
    div.addEventListener('click', () => selectOption(i));
    ol.appendChild(div);
  });

  if (answers[current] !== null) {
    document.getElementById('btnNext').disabled = false;
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectOption(idx) {
  answers[current] = idx;
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  document.getElementById('btnNext').disabled = false;
}

function goBack() {
  if (current > 0) { current--; renderQuestion(); }
}

function goNext() {
  if (answers[current] === null) return;
  if (current < TOTAL - 1) { current++; renderQuestion(); }
  else showResult();
}

// ── SCORING ───────────────────────────────────────────────────────────────
function computeScores() {
  const dims = {
    control: 0, shame: 0, aggression: 0, differentiation: 0,
    emotionalAvailability: 0, splitting: 0, abandonmentFear: 0, repair: 0
  };
  const counts = { ...dims };

  answers.forEach((ans, qi) => {
    if (ans === null) return;
    const w = questions[qi].options[ans].w || {};
    Object.keys(w).forEach(k => {
      if (dims[k] !== undefined) {
        dims[k] += w[k];
        counts[k]++;
      }
      // handle aliases
      if (k === 'abandonment' || k === 'abandonmentFear') {
        dims.abandonmentFear += w[k];
        counts.abandonmentFear++;
      }
    });
  });

  // Normalize each dimension to 0–100
  // Raw range roughly -5 to +20 across the questions; map to 0–100
  const normalized = {};
  const rawRanges = {
    control: [0, 18], shame: [0, 16], aggression: [0, 14],
    differentiation: [-3, 20], emotionalAvailability: [0, 15],
    splitting: [0, 16], abandonmentFear: [0, 20], repair: [-4, 15]
  };

  Object.keys(dims).forEach(k => {
    const [lo, hi] = rawRanges[k];
    let pct = (dims[k] - lo) / (hi - lo);
    pct = Math.max(0, Math.min(1, pct));
    normalized[k] = Math.round(pct * 100);
  });

  // For differentiation and repair, higher raw = lower risk; invert for display
  // (We'll show them positively framed)
  return { raw: dims, norm: normalized };
}

function overallRisk(norm) {
  // Weighted combination; high control/shame/aggression/splitting/abandonment = risk
  // high differentiation/repair/emotionalAvailability = protective
  const risk = (
    norm.control * 0.18 +
    norm.shame * 0.14 +
    norm.aggression * 0.12 +
    norm.splitting * 0.14 +
    norm.abandonmentFear * 0.14 +
    (100 - norm.differentiation) * 0.10 +
    (100 - norm.repair) * 0.10 +
    (100 - norm.emotionalAvailability) * 0.08
  );
  return Math.round(risk);
}

// ── RESULT RENDER ─────────────────────────────────────────────────────────
function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  const { raw, norm } = computeScores();
  const risk = overallRisk(norm);

  // Title + color
  let titleColor = '#c9a84c';
  let titleText = '';
  let subtitle = '';

  if (risk <= 22) {
    titleText = '低风险结构';
    subtitle = '关系中具备较强的心理弹性与自我觉察能力';
    titleColor = '#6fa87a';
  } else if (risk <= 42) {
    titleText = '轻度风险结构';
    subtitle = '存在一些值得关注的模式，但总体具备修复能力';
    titleColor = '#a8a06f';
  } else if (risk <= 62) {
    titleText = '中度风险结构';
    subtitle = '部分深层模式在长期关系中可能逐渐显露';
    titleColor = '#c9a84c';
  } else if (risk <= 80) {
    titleText = '较高风险结构';
    subtitle = '在深度绑定后，某些人格模式可能对关系造成持续影响';
    titleColor = '#c47e3a';
  } else {
    titleText = '高风险结构';
    subtitle = '当前结构特征在长期亲密关系中需要认真关注与处理';
    titleColor = '#c24b3a';
  }

  document.getElementById('resultTitle').innerHTML = `<span style="color:${titleColor}">${titleText}</span>`;
  document.getElementById('resultSubtitle').textContent = subtitle;
  document.getElementById('scoreNum').textContent = risk;
  document.getElementById('scoreCircle').style.setProperty('--pct', `${risk * 3.6}deg`);

  renderDimBars(norm);
  renderRadar(norm);
  renderRiskPaths(norm);
  renderNarrative(norm, risk);
  renderConclusion(norm, risk);
}

const dimMeta = [
  { key: 'control', label: '权力 / 控制', desc: '希望主导或影响关系走向的程度' },
  { key: 'shame', label: '羞耻防御', desc: '对脆弱和示弱的防御强度' },
  { key: 'aggression', label: '攻击性', desc: '处理不满时的外显或隐性攻击模式' },
  { key: 'splitting', label: '分裂倾向', desc: '对伴侣评价从"极好"到"极差"的波动幅度' },
  { key: 'abandonmentFear', label: '被抛弃恐惧', desc: '对失去对方的焦虑程度' },
  { key: 'differentiation', label: '自我分化', desc: '在关系中保持独立自我的能力（越高越好）', positive: true },
  { key: 'emotionalAvailability', label: '情感可及性', desc: '能否真正"接住"伴侣情感的能力（越高越好）', positive: true },
  { key: 'repair', label: '修复能力', desc: '在冲突或伤害后主动修复关系的能力（越高越好）', positive: true },
];

function renderDimBars(norm) {
  const container = document.getElementById('dimBars');
  container.innerHTML = '';
  dimMeta.forEach(d => {
    const val = norm[d.key];
    const color = d.positive
      ? `hsl(${80 + val * 0.6}, 50%, 50%)`
      : `hsl(${50 - val * 0.3}, 60%, 55%)`;
    container.innerHTML += `
      <div class="dim-row">
        <div class="dim-name">${d.label}</div>
        <div class="dim-bar-bg">
          <div class="dim-bar-fill" style="width:${val}%; background: linear-gradient(to right, ${color}99, ${color})"></div>
        </div>
        <div class="dim-val">${val}</div>
      </div>
    `;
  });
}

function renderRadar(norm) {
  const container = document.getElementById('radarWrap');
  const labels = ['控制','羞耻','攻击','分裂','被抛弃','分化','情感','修复'];
  const keys = ['control','shame','aggression','splitting','abandonmentFear','differentiation','emotionalAvailability','repair'];
  const values = keys.map(k => norm[k] / 100);
  const N = keys.length;
  const cx = 200, cy = 200, r = 150;

  function pt(i, frac) {
    const angle = (Math.PI * 2 * i / N) - Math.PI / 2;
    return [cx + frac * r * Math.cos(angle), cy + frac * r * Math.sin(angle)];
  }

  let gridSVG = '';
  [0.25, 0.5, 0.75, 1].forEach(frac => {
    const pts = Array.from({length: N}, (_, i) => pt(i, frac).join(',')).join(' ');
    gridSVG += `<polygon points="${pts}" fill="none" stroke="#2e2a22" stroke-width="1"/>`;
  });

  let axesSVG = '';
  for (let i = 0; i < N; i++) {
    const [x, y] = pt(i, 1);
    axesSVG += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#2e2a22" stroke-width="1"/>`;
  }

  const dataPts = values.map((v, i) => pt(i, v).join(',')).join(' ');
  const labelsSVG = labels.map((lbl, i) => {
    const [x, y] = pt(i, 1.18);
    return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" fill="#a89880" font-size="11" font-family="Noto Sans SC">${lbl}</text>`;
  }).join('');

  container.innerHTML = `
    <svg class="radar" viewBox="0 0 400 400" width="360" height="360">
      ${gridSVG}${axesSVG}
      <polygon points="${dataPts}" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1.5"/>
      ${values.map((v, i) => { const [x,y]=pt(i,v); return `<circle cx="${x}" cy="${y}" r="4" fill="#c9a84c"/>`; }).join('')}
      ${labelsSVG}
    </svg>
  `;
}

function renderRiskPaths(norm) {
  const container = document.getElementById('riskPaths');
  const paths = [];

  if (norm.control >= 60 && norm.splitting >= 50 && norm.emotionalAvailability <= 40)
    paths.push({ label: '高功能型控制人格', type: 'risk', desc: '通过逻辑和"定义现实"来主导关系，伴侣可能逐渐失去自我判断力' });
  if (norm.shame >= 60 && norm.aggression >= 50)
    paths.push({ label: '压抑-爆发型', type: 'risk', desc: '长期压抑不满，在临界点后可能以突然爆发的方式释放积累的情绪' });
  if (norm.abandonmentFear >= 65 && norm.splitting >= 55)
    paths.push({ label: '边缘型依恋风险', type: 'risk', desc: '对被遗弃的恐惧与对伴侣评价的剧烈波动相互强化，关系可能呈现极端化' });
  if (norm.splitting >= 65)
    paths.push({ label: '理想化-贬低波动型', type: 'risk', desc: '对伴侣的评价容易在"完美"与"失望"之间剧烈切换，难以维持稳定的关系认知' });
  if (norm.emotionalAvailability <= 35 && norm.shame >= 55)
    paths.push({ label: '情感撤离型', type: 'risk', desc: '不会激烈冲突，但在关系深入后容易以情绪冷淡代替真实回应' });
  if (norm.abandonmentFear >= 60 && norm.control >= 55)
    paths.push({ label: '焦虑控制型', type: 'risk', desc: '通过控制行为来管理被抛弃的恐惧，追逐与试探并行' });

  // Strengths
  if (norm.repair >= 65)
    paths.push({ label: '强修复能力', type: 'strength', desc: '能主动承担关系中的裂痕修复，这是长期关系的重要保障' });
  if (norm.differentiation >= 65)
    paths.push({ label: '高自我分化', type: 'strength', desc: '在关系中能保持独立自我，减少过度融合或过度依赖' });
  if (norm.emotionalAvailability >= 65)
    paths.push({ label: '高情感可及性', type: 'strength', desc: '能真正"接住"伴侣的情感，是亲密连接的重要基础' });

  if (paths.length === 0) {
    paths.push({ label: '结构较为平衡', type: 'strength', desc: '各维度未出现极端化，风险模式相对分散' });
  }

  container.innerHTML = paths.map(p => `
    <div style="margin-bottom:16px">
      <span class="${p.type === 'risk' ? 'risk-tag' : 'strength-tag'}">${p.type === 'risk' ? '⚑' : '◆'} ${p.label}</span>
      <p style="font-size:13px; color:var(--text-dim); margin-top:8px; line-height:1.7; margin-left:4px">${p.desc}</p>
    </div>
  `).join('');
}

  }

  } else {

  }

  // Repair
  if (norm.repair >= 65) {

  } else if (norm.repair >= 40) {
    blocks.push({ title: '修复能力：中等', body: '你有修复意愿，但有时会因为自尊、委屈或不知道如何开口而延迟行动。这很人性，但长期来看，修复的时机越晚，代价往往越大。尝试找到一种对你来说"低门槛"的修复方式会很有帮助。' });
  } else {
    blocks.push({ title: '修复能力：待加强', body: '你在冲突后倾向于等待、回避或用时间消解，这在短期内可能有效，但可能会让积累的问题逐渐变成关系的底层裂缝。修复能力是可以学习的，关键是愿意率先迈出那一步。' });
  }

  const container = document.getElementById('narrativeBlocks');
  container.innerHTML = blocks.map(b => `
    <div class="narrative-block">
      <h4>${b.title}</h4>
      <p>${b.body}</p>
    </div>
  `).join('');
}

function renderConclusion(norm, risk) {

  // Repair analysis
  if (norm.repair <= 40) {

  if (risk <= 22) {

      <p>重要的是：这些模式不是"你这个人"，它们是你早年发展出来的生存策略。它们曾经有用，但现在可能正在阻止你获得你真正渴望的亲密。改变是可能的，但它需要结构性的支持——不只是"想清楚"，而是在安全的容器里真正重新体验和整合那些早年未完成的部分。</p>

      <p>根据创伤性联结理论，施害者通过间歇性的"好-坏"交替，让受害者产生强烈的情感依赖。如果你发现自己在关系中反复经历"虐待-补偿-甜蜜"的循环，这可能是一个重要的信号。</p>
      <p>这个结果不是判决，而是一面镜子。很多有类似结构的人，通过持续的专业工作，能够真正重建自己的内在模型，进入不同质地的关系。这需要时间，需要一个足够安全的治疗空间，以及你真正愿意让自己被看见的勇气。</p>
      <p>如果你目前正在一段关系中，请认真评估这段关系对双方的影响。如果你正在考虑进入一段新的关系，建议先给自己一段专注于内在工作的时间。你值得一段不需要用旧的模式去维系的关系，但它需要你先做一些自己的工作。</p>
    `;
  }
  
  // Add personalized insights if any
  if (personalizedInsights.length > 0) {
    html += `<div style="margin-top:24px;padding-top:24px;border-top:1px solid var(--border)">
      <p><strong style="color:var(--cream)">你的个性化分析</strong></p>
      ${personalizedInsights.map(insight => `<p style="margin-top:16px">${insight}</p>`).join('')}
    </div>`;
  }

  document.getElementById('conclusionBox').innerHTML = html;
}

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzJHUv916apsz5eWEyaqyM1UV4WRFQW3yyUAzcw89L30_W5OhQwaqdb9OQvjmeUt3E/exec';

function submitResult() {
  const { raw, norm } = computeScores();
  const risk = overallRisk(norm);
  
  // Build data
  const data = {
    timestamp: new Date().toISOString(),
    riskScore: risk,
    riskLevel: document.getElementById('resultTitle').textContent,
    dimensions: norm,
    rawScores: raw,
    answers: answers
  };
  
  // Encode to base64 for URL sharing
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  const shareUrl = `${window.location.origin}${window.location.pathname}#result=${encoded}`;
  
  // Show share link immediately
  document.getElementById('shareUrl').value = shareUrl;
  document.getElementById('shareLink').style.display = 'block';
  
  // Also submit to Google Sheets if URL is configured
  if (APPS_SCRIPT_URL) {
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).catch(() => {}); // Silent fail for Sheets, share link always works
  }
}

// Load shared result from URL
window.addEventListener('DOMContentLoaded', () => {
  const hash = window.location.hash;
  if (hash.startsWith('#result=')) {
    try {
      const encoded = hash.substring(8);
      const data = JSON.parse(decodeURIComponent(escape(atob(encoded))));
      
      // Show result section
      document.getElementById('cover').style.display = 'none';
      document.getElementById('result').style.display = 'block';
      
      // Fill in the result data
      let titleColor = '#c9a84c';

      else if (data.riskScore <= 42) titleColor = '#a8a06f';
      else if (data.riskScore <= 62) titleColor = '#c9a84c';
      else if (data.riskScore <= 80) titleColor = '#c47e3a';
      else titleColor = '#c24b3a';
      
      document.getElementById('resultTitle').innerHTML = `<span style="color:${titleColor}">${data.riskLevel}</span>`;
      document.getElementById('scoreNum').textContent = data.riskScore;
      document.getElementById('scoreCircle').style.setProperty('--pct', `${data.riskScore * 3.6}deg`);
      
      // Render dimensions
      const container = document.getElementById('dimBars');
      const dimMeta = [
        { key: 'control', label: '权力 / 控制', positive: false },
        { key: 'shame', label: '羞耻防御', positive: false },
        { key: 'aggression', label: '攻击性', positive: false },
        { key: 'splitting', label: '分裂倾向', positive: false },
        { key: 'abandonmentFear', label: '被抛弃恐惧', positive: false },
        { key: 'differentiation', label: '自我分化', positive: true },
        { key: 'emotionalAvailability', label: '情感可及性', positive: true },
        { key: 'repair', label: '修复能力', positive: true }
      ];
      container.innerHTML = '';
      dimMeta.forEach(d => {
        const val = data.dimensions[d.key] || 0;
        const color = d.positive
          ? `hsl(${80 + val * 0.6}, 50%, 50%)`
          : `hsl(${50 - val * 0.3}, 60%, 55%)`;
        container.innerHTML += `
          <div class="dim-row">
            <div class="dim-name">${d.label}</div>
            <div class="dim-bar-bg">
              <div class="dim-bar-fill" style="width:${val}%; background: linear-gradient(to right, ${color}99, ${color})"></div>
            </div>
            <div class="dim-val">${val}</div>
          </div>
        `;
      });
      
      // Hide restart button for shared results
      document.querySelector('.result-restart').innerHTML = '<p style="color:var(--text-dim);font-size:13px;text-align:center">这是他人的测试结果 <a href="." style="color:var(--gold)">我也想测一测</a></p>';
      
    } catch (e) {
      console.error('Failed to load shared result:', e);
    }
  }
});
</script>
</body>
</html>
