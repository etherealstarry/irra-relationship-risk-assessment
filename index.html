<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRRA · 亲密关系风险评估</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a;
    --bg2: #161310;
    --surface: #1c1915;
    --surface2: #242019;
    --border: #2e2a22;
    --border-light: #3d3830;
    --gold: #c9a84c;
    --gold-dim: #8a6f30;
    --gold-glow: rgba(201,168,76,0.12);
    --cream: #e8dcc8;
    --cream-dim: #a89880;
    --text: #d4c9b5;
    --text-dim: #7a6e5e;
    --red: #c24b3a;
    --red-dim: #7a2f22;
    --accent: #9b7fa8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(201,168,76,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(155,127,168,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── COVER ── */
  #cover {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .cover-tag {
    font-family: 'DM Serif Display', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
  }

  .cover-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(48px, 8vw, 88px);
    color: var(--cream);
    line-height: 1;
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp 0.8s 0.4s forwards;
    letter-spacing: -0.02em;
  }

  .cover-title span {
    color: var(--gold);
    font-style: italic;
  }

  .cover-sub {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeUp 0.8s 0.6s forwards;
  }

  .cover-divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, var(--gold-dim), transparent);
    margin: 0 auto 40px;
    opacity: 0;
    animation: fadeUp 0.8s 0.7s forwards;
  }

  .cover-desc {
    max-width: 480px;
    font-size: 14px;
    line-height: 2;
    color: var(--cream-dim);
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeUp 0.8s 0.8s forwards;
  }

  .cover-meta {
    display: flex;
    gap: 40px;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeUp 0.8s 0.9s forwards;
  }

  .meta-item {
    text-align: center;
  }

  .meta-num {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--gold);
    display: block;
  }

  .meta-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    margin-top: 4px;
    display: block;
  }

  .btn-start {
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    padding: 16px 48px;
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.3s;
    opacity: 0;
    animation: fadeUp 0.8s 1s forwards;
    position: relative;
    overflow: hidden;
  }

  .btn-start::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold-glow);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn-start:hover { border-color: var(--gold); }
  .btn-start:hover::before { opacity: 1; }

  .cover-warning {
    margin-top: 40px;
    font-size: 11px;
    color: var(--text-dim);
    max-width: 360px;
    line-height: 1.8;
    opacity: 0;
    animation: fadeUp 0.8s 1.1s forwards;
  }

  /* ── QUIZ ── */
  #quiz { display: none; min-height: 100vh; position: relative; z-index: 1; }

  .quiz-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: rgba(14,12,10,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    z-index: 100;
  }

  .quiz-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  .quiz-progress-wrap {
    flex: 1;
    margin: 0 32px;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    position: relative;
  }

  .quiz-progress-bar {
    height: 100%;
    background: linear-gradient(to right, var(--gold-dim), var(--gold));
    border-radius: 1px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 8px rgba(201,168,76,0.4);
  }

  .quiz-counter {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .quiz-body {
    max-width: 720px;
    margin: 0 auto;
    padding: 100px 24px 80px;
  }

  .q-module {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 20px;
    font-family: 'DM Serif Display', serif;
  }

  .q-context {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--gold-dim);
    padding: 16px 20px;
    margin-bottom: 28px;
    font-size: 13px;
    color: var(--cream-dim);
    line-height: 1.8;
    font-style: italic;
  }

  .q-text {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(17px, 3vw, 22px);
    line-height: 1.7;
    color: var(--cream);
    margin-bottom: 36px;
    font-weight: 300;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px 24px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    text-align: left;
    position: relative;
    overflow: hidden;
  }

  .option::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold-glow);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .option:hover {
    border-color: var(--border-light);
  }

  .option:hover::before { opacity: 1; }

  .option.selected {
    border-color: var(--gold-dim);
    background: var(--surface2);
  }

  .option.selected::before { opacity: 1; }

  .opt-letter {
    width: 26px;
    height: 26px;
    border: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    color: var(--text-dim);
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .option.selected .opt-letter {
    border-color: var(--gold);
    color: var(--gold);
  }

  .opt-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    padding-top: 4px;
  }

  .quiz-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 44px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
  }

  .btn-nav {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-dim);
    padding: 10px 28px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans SC', sans-serif;
    letter-spacing: 0.1em;
  }

  .btn-nav:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  .btn-nav:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .btn-next {
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  .btn-next:hover {
    border-color: var(--gold) !important;
    background: var(--gold-glow);
    color: var(--gold) !important;
  }

  .btn-next:disabled {
    opacity: 0.25;
  }

  /* ── RESULT ── */
  #result { display: none; position: relative; z-index: 1; }

  .result-hero {
    min-height: 50vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px 48px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  .result-tag {
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--text-dim);
    margin-bottom: 24px;
    font-family: 'DM Serif Display', serif;
    text-transform: uppercase;
  }

  .result-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(36px, 6vw, 64px);
    line-height: 1.1;
    margin-bottom: 16px;
  }

  .result-score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid var(--gold-dim);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 28px auto;
    position: relative;
  }

  .result-score-circle::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 50%;
    background: conic-gradient(var(--gold) var(--pct), transparent var(--pct));
    -webkit-mask: radial-gradient(farthest-side, transparent 55%, black 56%);
    mask: radial-gradient(farthest-side, transparent 55%, black 56%);
    opacity: 0.6;
  }

  .score-num {
    font-family: 'DM Serif Display', serif;
    font-size: 40px;
    color: var(--gold);
    line-height: 1;
  }

  .score-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    margin-top: 2px;
  }

  .result-subtitle {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    color: var(--cream);
    margin-top: 8px;
  }

  .result-body {
    max-width: 800px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }

  .result-section {
    margin-bottom: 56px;
  }

  .result-section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* Radar chart */
  .chart-wrap {
    display: flex;
    justify-content: center;
    margin: 32px 0;
  }

  svg.radar { overflow: visible; }

  /* Dimension bars */
  .dim-bars { display: flex; flex-direction: column; gap: 14px; }

  .dim-row {
    display: grid;
    grid-template-columns: 160px 1fr 40px;
    align-items: center;
    gap: 16px;
  }

  .dim-name {
    font-size: 12px;
    color: var(--cream-dim);
    text-align: right;
    letter-spacing: 0.05em;
  }

  .dim-bar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .dim-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(to right, var(--gold-dim), var(--gold));
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
  }

  .dim-val {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    color: var(--text-dim);
  }

  /* Narrative */
  .narrative-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--gold-dim);
    padding: 28px 32px;
    margin-bottom: 20px;
    line-height: 1.9;
    font-size: 14px;
    color: var(--text);
  }

  .narrative-block h4 {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    color: var(--cream);
    margin-bottom: 12px;
    font-weight: 400;
  }

  /* Risk paths */
  .risk-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border: 1px solid var(--red-dim);
    background: rgba(194,75,58,0.08);
    font-size: 12px;
    color: #d4705e;
    margin: 4px;
    letter-spacing: 0.05em;
  }

  .strength-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border: 1px solid var(--gold-dim);
    background: var(--gold-glow);
    font-size: 12px;
    color: var(--gold);
    margin: 4px;
    letter-spacing: 0.05em;
  }

  .conclusion-box {
    background: var(--surface2);
    border: 1px solid var(--border-light);
    padding: 36px;
    line-height: 2;
    font-size: 14px;
    color: var(--text);
  }

  .conclusion-box p { margin-bottom: 16px; }
  .conclusion-box p:last-child { margin-bottom: 0; }

  .result-restart {
    text-align: center;
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeUp 0.5s forwards; }

  @media (max-width: 600px) {
    .dim-row { grid-template-columns: 110px 1fr 30px; }
    .dim-name { font-size: 11px; }
    .quiz-header { padding: 0 16px; }
  }
</style>
</head>
<body>

<!-- COVER -->
<section id="cover">
  <div class="cover-tag">Intimate Relationship Risk Architecture · v0.2</div>
  <div class="cover-title">IRRA<br><span>亲密关系</span></div>
  <div class="cover-sub">人格风险结构评估系统</div>
  <div class="cover-divider"></div>
  <div class="cover-desc">
    这不是测试你的伴侣——<br>
    而是测试你在长期亲密关系中真实的人格走向。<br>
    没有明显的好坏之分。请凭直觉作答。
  </div>
  <div class="cover-meta">
    <div class="meta-item">
      <span class="meta-num">40</span>
      <span class="meta-label">题目</span>
    </div>
    <div class="meta-item">
      <span class="meta-num">8</span>
      <span class="meta-label">核心维度</span>
    </div>
    <div class="meta-item">
      <span class="meta-num">15'</span>
      <span class="meta-label">预计时长</span>
    </div>
  </div>
  <button class="btn-start" onclick="startQuiz()">开始评估</button>
  <div class="cover-warning">
    本测评基于依恋理论、羞耻动力学、客体关系理论等心理学框架，<br>
    仅供自我探索参考，不构成诊断。
  </div>
</section>

<!-- QUIZ -->
<section id="quiz">
  <div class="quiz-header">
    <div class="quiz-logo">IRRA</div>
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="quiz-counter" id="counter">1 / 40</div>
  </div>
  <div class="quiz-body" id="quizBody"></div>
</section>

<!-- RESULT -->
<section id="result">
  <div class="result-hero">
    <div class="result-tag">IRRA · 评估报告</div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-score-circle" id="scoreCircle">
      <div class="score-num" id="scoreNum">—</div>
      <div class="score-label">综合风险指数</div>
    </div>
    <div class="result-subtitle" id="resultSubtitle"></div>
  </div>
  <div class="result-body">
    <div class="result-section">
      <div class="result-section-title">维度雷达图</div>
      <div class="chart-wrap" id="radarWrap"></div>
    </div>
    <div class="result-section">
      <div class="result-section-title">八大维度得分</div>
      <div class="dim-bars" id="dimBars"></div>
    </div>
    <div class="result-section">
      <div class="result-section-title">人格风险路径</div>
      <div id="riskPaths"></div>
    </div>
    <div class="result-section">
      <div class="result-section-title">详细分析</div>
      <div id="narrativeBlocks"></div>
    </div>
    <div class="result-section">
      <div class="result-section-title">综合结论</div>
      <div class="conclusion-box" id="conclusionBox"></div>
    </div>
    <div class="result-restart">
      <button class="btn-start" onclick="restartQuiz()">重新测试</button>
    </div>
  </div>
</section>

<script>
// ── QUESTION BANK ──────────────────────────────────────────────────────────
// Dimensions: control, shame, aggression, differentiation,
//             emotionalAvailability, splitting, abandonmentFear, repair

const questions = [
  // 1
  {
    module: "日常相处",
    text: "你在整理家里东西的时候，发现伴侣把你常用的东西换了位置，但没告诉你。你最可能的反应是？",
    options: [
      { text: "找到之后放回原来的地方，下次告诉他/她我的习惯", w: {control:1, differentiation:1} },
      { text: "有些困惑，但不会提，因为觉得说出来显得小题大做", w: {shame:2, repair:-1} },
      { text: "有点不舒服，想知道为什么不先问我一下", w: {control:2, aggression:1} },
      { text: "觉得无所谓，反正放哪都找得到", w: {differentiation:2} }
    ]
  },
  // 2
  {
    module: "边界感知",
    text: "伴侣去和朋友吃饭，你不认识那些人。饭局比预计晚了一个小时才结束，期间只回了你一条消息。你的感受更接近哪种？",
    options: [
      { text: "偶尔看一眼手机，但没有特别在意，他/她忙就是忙", w: {abandonmentFear:0, differentiation:2} },
      { text: "有点担心，回了消息但在心里提醒自己不要催", w: {abandonmentFear:1, shame:1} },
      { text: "越来越不安，开始想对方是不是不想回来了", w: {abandonmentFear:3, splitting:1} },
      { text: "回了消息没反应，觉得有点不受重视", w: {control:1, abandonmentFear:2, aggression:1} }
    ]
  },
  // 3
  {
    module: "冲突反应",
    text: "你和伴侣为某件事发生了争执，说了一些重话。事后你会？",
    options: [
      { text: "等自己冷静下来之后，主动去道歉，说清楚自己当时的想法", w: {repair:3, shame:1} },
      { text: "等对方先道歉，觉得自己也有委屈在", w: {control:1, repair:0} },
      { text: "假装什么都没发生，期待关系自然恢复", w: {shame:2, aggression:1, repair:-1} },
      { text: "心里过不去，但不知道怎么开口，可能用行动来弥补", w: {shame:3, repair:1} }
    ]
  },
  // 4
  {
    module: "独立与依赖",
    text: "伴侣告诉你，他/她想利用周末独自去旅行三天，说需要一些个人空间。你的内心反应是？",
    options: [
      { text: "觉得挺好的，自己也可以安排一些事情做", w: {differentiation:2, abandonmentFear:0} },
      { text: "能理解，但心里有一点失落感", w: {abandonmentFear:1, differentiation:1} },
      { text: "有点担心，忍不住问他/她是不是对我有什么不满", w: {abandonmentFear:3, control:1} },
      { text: "觉得有些奇怪，两个人在一起为什么需要独自旅行", w: {control:2, differentiation:-1, abandonmentFear:2} }
    ]
  },
  // 5
  {
    module: "情感承接",
    text: "伴侣在和你说话时突然哽咽了，没有解释原因，只是沉默着。你会怎么做？",
    options: [
      { text: "安静地靠近他/她，不说话，只是陪着", w: {emotionalAvailability:3} },
      { text: "问'怎么了'，想帮他/她解决问题", w: {emotionalAvailability:2, control:1} },
      { text: "感到不知所措，默默等对方先开口", w: {emotionalAvailability:1, shame:2} },
      { text: "有点不自在，想说点什么来缓解气氛", w: {emotionalAvailability:0, aggression:1} }
    ]
  },
  // 6
  {
    module: "权力感知",
    text: "在你们日常的决策中（比如去哪吃饭、怎么安排周末），通常是谁主导？",

// ── STATE ─────────────────────────────────────────────────────────────────
let current = 0;
let answers = new Array(questions.length).fill(null);
const TOTAL = questions.length;

// ── NAVIGATION ────────────────────────────────────────────────────────────
function startQuiz() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function restartQuiz() {
  current = 0;
  answers = new Array(TOTAL).fill(null);
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const pct = ((current) / TOTAL * 100).toFixed(1);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('counter').textContent = `${current + 1} / ${TOTAL}`;

  const body = document.getElementById('quizBody');
  body.innerHTML = `
    <div class="q-module fade-in">${q.module}</div>
    ${q.context ? `<div class="q-context fade-in">${q.context}</div>` : ''}
    <div class="q-text fade-in">${q.text}</div>
    <div class="options" id="optionList"></div>
    <div class="quiz-nav">
      <button class="btn-nav" onclick="goBack()" ${current === 0 ? 'disabled' : ''}>← 上一题</button>
      <button class="btn-nav btn-next" id="btnNext" onclick="goNext()" disabled>
        ${current === TOTAL - 1 ? '查看结果 →' : '下一题 →'}
      </button>
    </div>
  `;

  const letters = ['A','B','C','D'];
  const ol = document.getElementById('optionList');
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (answers[current] === i ? ' selected' : '');
    div.innerHTML = `<div class="opt-letter">${letters[i]}</div><div class="opt-text">${opt.text}</div>`;
    div.addEventListener('click', () => selectOption(i));
    ol.appendChild(div);
  });

  if (answers[current] !== null) {
    document.getElementById('btnNext').disabled = false;
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectOption(idx) {
  answers[current] = idx;
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  document.getElementById('btnNext').disabled = false;
}

function goBack() {
  if (current > 0) { current--; renderQuestion(); }
}

function goNext() {
  if (answers[current] === null) return;
  if (current < TOTAL - 1) { current++; renderQuestion(); }
  else showResult();
}

// ── SCORING ───────────────────────────────────────────────────────────────
function computeScores() {
  const dims = {
    control: 0, shame: 0, aggression: 0, differentiation: 0,
    emotionalAvailability: 0, splitting: 0, abandonmentFear: 0, repair: 0
  };
  const counts = { ...dims };

  answers.forEach((ans, qi) => {
    if (ans === null) return;
    const w = questions[qi].options[ans].w || {};
    Object.keys(w).forEach(k => {
      if (dims[k] !== undefined) {
        dims[k] += w[k];
        counts[k]++;
      }
      // handle aliases
      if (k === 'abandonment' || k === 'abandonmentFear') {
        dims.abandonmentFear += w[k];
        counts.abandonmentFear++;
      }
    });
  });

  // Normalize each dimension to 0–100
  // Raw range roughly -5 to +20 across the questions; map to 0–100
  const normalized = {};
  const rawRanges = {
    control: [0, 18], shame: [0, 16], aggression: [0, 14],
    differentiation: [-3, 20], emotionalAvailability: [0, 15],
    splitting: [0, 16], abandonmentFear: [0, 20], repair: [-4, 15]
  };

  Object.keys(dims).forEach(k => {
    const [lo, hi] = rawRanges[k];
    let pct = (dims[k] - lo) / (hi - lo);
    pct = Math.max(0, Math.min(1, pct));
    normalized[k] = Math.round(pct * 100);
  });

  // For differentiation and repair, higher raw = lower risk; invert for display
  // (We'll show them positively framed)
  return { raw: dims, norm: normalized };
}

function overallRisk(norm) {
  // Weighted combination; high control/shame/aggression/splitting/abandonment = risk
  // high differentiation/repair/emotionalAvailability = protective
  const risk = (
    norm.control * 0.18 +
    norm.shame * 0.14 +
    norm.aggression * 0.12 +
    norm.splitting * 0.14 +
    norm.abandonmentFear * 0.14 +
    (100 - norm.differentiation) * 0.10 +
    (100 - norm.repair) * 0.10 +
    (100 - norm.emotionalAvailability) * 0.08
  );
  return Math.round(risk);
}

// ── RESULT RENDER ─────────────────────────────────────────────────────────
function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  const { raw, norm } = computeScores();
  const risk = overallRisk(norm);

  // Title + color
  let titleColor = '#c9a84c';
  let titleText = '';
  let subtitle = '';

  if (risk <= 22) {
    titleText = '低风险结构';
    subtitle = '关系中具备较强的心理弹性与自我觉察能力';
    titleColor = '#6fa87a';
  } else if (risk <= 42) {
    titleText = '轻度风险结构';
    subtitle = '存在一些值得关注的模式，但总体具备修复能力';
    titleColor = '#a8a06f';
  } else if (risk <= 62) {
    titleText = '中度风险结构';
    subtitle = '部分深层模式在长期关系中可能逐渐显露';
    titleColor = '#c9a84c';
  } else if (risk <= 80) {
    titleText = '较高风险结构';
    subtitle = '在深度绑定后，某些人格模式可能对关系造成持续影响';
    titleColor = '#c47e3a';
  } else {
    titleText = '高风险结构';
    subtitle = '当前结构特征在长期亲密关系中需要认真关注与处理';
    titleColor = '#c24b3a';
  }

  document.getElementById('resultTitle').innerHTML = `<span style="color:${titleColor}">${titleText}</span>`;
  document.getElementById('resultSubtitle').textContent = subtitle;
  document.getElementById('scoreNum').textContent = risk;
  document.getElementById('scoreCircle').style.setProperty('--pct', `${risk * 3.6}deg`);

  renderDimBars(norm);
  renderRadar(norm);
  renderRiskPaths(norm);
  renderNarrative(norm, risk);
  renderConclusion(norm, risk);
}

const dimMeta = [
  { key: 'control', label: '权力 / 控制', desc: '希望主导或影响关系走向的程度' },
  { key: 'shame', label: '羞耻防御', desc: '对脆弱和示弱的防御强度' },

  { key: 'abandonmentFear', label: '被抛弃恐惧', desc: '对失去对方的焦虑程度' },
  { key: 'differentiation', label: '自我分化', desc: '在关系中保持独立自我的能力（越高越好）', positive: true },
  { key: 'emotionalAvailability', label: '情感可及性', desc: '能否真正"接住"伴侣情感的能力（越高越好）', positive: true },

function renderDimBars(norm) {
  const container = document.getElementById('dimBars');
  container.innerHTML = '';
  dimMeta.forEach(d => {
    const val = norm[d.key];
    const color = d.positive
      ? `hsl(${80 + val * 0.6}, 50%, 50%)`
      : `hsl(${50 - val * 0.3}, 60%, 55%)`;
    container.innerHTML += `
      <div class="dim-row">
        <div class="dim-name">${d.label}</div>
        <div class="dim-bar-bg">
          <div class="dim-bar-fill" style="width:${val}%; background: linear-gradient(to right, ${color}99, ${color})"></div>
        </div>
        <div class="dim-val">${val}</div>
      </div>
    `;
  });
}

function renderRadar(norm) {
  const container = document.getElementById('radarWrap');
  const labels = ['控制','羞耻','攻击','分裂','被抛弃','分化','情感','修复'];
  const keys = ['control','shame','aggression','splitting','abandonmentFear','differentiation','emotionalAvailability','repair'];
  const values = keys.map(k => norm[k] / 100);
  const N = keys.length;
  const cx = 200, cy = 200, r = 150;

  function pt(i, frac) {
    const angle = (Math.PI * 2 * i / N) - Math.PI / 2;
    return [cx + frac * r * Math.cos(angle), cy + frac * r * Math.sin(angle)];
  }

  let gridSVG = '';
  [0.25, 0.5, 0.75, 1].forEach(frac => {
    const pts = Array.from({length: N}, (_, i) => pt(i, frac).join(',')).join(' ');
    gridSVG += `<polygon points="${pts}" fill="none" stroke="#2e2a22" stroke-width="1"/>`;
  });

  let axesSVG = '';
  for (let i = 0; i < N; i++) {
    const [x, y] = pt(i, 1);
    axesSVG += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#2e2a22" stroke-width="1"/>`;
  }

  const dataPts = values.map((v, i) => pt(i, v).join(',')).join(' ');
  const labelsSVG = labels.map((lbl, i) => {
    const [x, y] = pt(i, 1.18);
    return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" fill="#a89880" font-size="11" font-family="Noto Sans SC">${lbl}</text>`;
  }).join('');

  container.innerHTML = `
    <svg class="radar" viewBox="0 0 400 400" width="360" height="360">
      ${gridSVG}${axesSVG}
      <polygon points="${dataPts}" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1.5"/>
      ${values.map((v, i) => { const [x,y]=pt(i,v); return `<circle cx="${x}" cy="${y}" r="4" fill="#c9a84c"/>`; }).join('')}
      ${labelsSVG}
    </svg>
  `;
}

function renderRiskPaths(norm) {
  const container = document.getElementById('riskPaths');
  const paths = [];

  if (norm.control >= 60 && norm.splitting >= 50 && norm.emotionalAvailability <= 40)
    paths.push({ label: '高功能型控制人格', type: 'risk', desc: '通过逻辑和"定义现实"来主导关系，伴侣可能逐渐失去自我判断力' });
  if (norm.shame >= 60 && norm.aggression >= 50)
    paths.push({ label: '压抑-爆发型', type: 'risk', desc: '长期压抑不满，在临界点后可能以突然爆发的方式释放积累的情绪' });
  if (norm.abandonmentFear >= 65 && norm.splitting >= 55)
    paths.push({ label: '边缘型依恋风险', type: 'risk', desc: '对被遗弃的恐惧与对伴侣评价的剧烈波动相互强化，关系可能呈现极端化' });
  if (norm.splitting >= 65)
    paths.push({ label: '理想化-贬低波动型', type: 'risk', desc: '对伴侣的评价容易在"完美"与"失望"之间剧烈切换，难以维持稳定的关系认知' });
  if (norm.emotionalAvailability <= 35 && norm.shame >= 55)
    paths.push({ label: '情感撤离型', type: 'risk', desc: '不会激烈冲突，但在关系深入后容易以情绪冷淡代替真实回应' });
  if (norm.abandonmentFear >= 60 && norm.control >= 55)
    paths.push({ label: '焦虑控制型', type: 'risk', desc: '通过控制行为来管理被抛弃的恐惧，追逐与试探并行' });

  // Strengths
  if (norm.repair >= 65)
    paths.push({ label: '强修复能力', type: 'strength', desc: '能主动承担关系中的裂痕修复，这是长期关系的重要保障' });
  if (norm.differentiation >= 65)
    paths.push({ label: '高自我分化', type: 'strength', desc: '在关系中能保持独立自我，减少过度融合或过度依赖' });
  if (norm.emotionalAvailability >= 65)
    paths.push({ label: '高情感可及性', type: 'strength', desc: '能真正"接住"伴侣的情感，是亲密连接的重要基础' });

  if (paths.length === 0) {
    paths.push({ label: '结构较为平衡', type: 'strength', desc: '各维度未出现极端化，风险模式相对分散' });
  }

  container.innerHTML = paths.map(p => `
    <div style="margin-bottom:16px">
      <span class="${p.type === 'risk' ? 'risk-tag' : 'strength-tag'}">${p.type === 'risk' ? '⚑' : '◆'} ${p.label}</span>
      <p style="font-size:13px; color:var(--text-dim); margin-top:8px; line-height:1.7; margin-left:4px">${p.desc}</p>
    </div>
  `).join('');
}

  } else if (norm.control >= 45) {

      <p>你的测评结果显示，在当前这个时间节点，你在亲密关系中具备相对健全的心理资源。你能够在不完全失去自我的情况下进入亲密关系，对伴侣的独立性有较高的耐受度，修复能力和情感可及性均处于良好水平。</p>
      <p>这并不意味着你的关系不会遇到挑战——没有人是"零风险"的。关系本身就是一个持续激活两个人内部模式的容器。你目前的结构表明，当压力和深度绑定到来时，你有相对好的基础去应对，但仍然需要持续的自我觉察，尤其是在关系的2–3年后，当"创伤人格层"开始逐渐浮现的时候。</p>
      <p>值得继续关注的是：你是否有某些被压抑的部分尚未真正在关系中暴露？低风险结构有时也可能来自"关系还没有足够深入"。真正的压力测试往往在深度绑定之后才开始。</p>
    `;
  } else if (risk <= 42) {
    html = `
      <p><strong style="color:var(--cream)">综合指数 23–42：轻度风险结构 / 觉察关键期</strong></p>
      <p>你的结果显示出一些值得关注的结构性模式，但整体来看，你具备足够的心理弹性和自我觉察能力来处理它们。这个分数段的人往往是"知道自己有些问题，但还没有完全解锁它们"——你能意识到一些惯性，但在情绪激动的时刻仍然会被带走。</p>
      <p>你最需要关注的，是那些在日常中不太显眼、但在深度绑定后会逐渐放大的模式：也许是羞耻防御让你很难真正展现脆弱；也许是对被抛弃的隐性焦虑会让你在某些时刻做出一些让自己事后后悔的反应；也许是你的修复意愿有时会输给自尊或等待。</p>
      <p>好消息是：这个阶段的人通常对反馈是开放的，也有能力从觉察走向改变。心理咨询、关系教育，或者仅仅是找一个能真正说话的伴侣，都是有效的路径。</p>
    `;
  } else if (risk <= 62) {
    html = `
      <p><strong style="color:var(--cream)">综合指数 43–62：中度风险结构 / 深层模式激活区</strong></p>
      <p>你的测评结果提示，你在亲密关系的深入期——通常是关系的第2到4年——可能会遭遇明显的人格模式激活。这不是说你"有问题"，而是说你内在有一些早年形成的结构，它们在关系足够深、防御足够低的时候，会开始主导你的反应。</p>
      <p>可能的表现包括：伴侣开始说"我不知道你为什么突然变了"；或者你发现自己在关系中越来越容易感到受困或愤怒；或者你和伴侣的关系开始出现某种令双方都感到困惑的循环。</p>
      <p>中度风险结构的人往往有一个共同点：外部功能正常甚至优秀，但在"被真正看见"的时刻会感到强烈的不适。这个不适本身是重要的入口——它指向你最需要工作的内在区域。</p>
      <p>这个阶段强烈建议寻求专业心理支持，不是因为你"出了问题"，而是因为你已经到了一个深度工作能带来真实改变的时机。</p>
    `;
  } else if (risk <= 80) {
    html = `
      <p><strong style="color:var(--cream)">综合指数 63–80：较高风险结构 / 结构性工作必要期</strong></p>
      <p>你的测评结果显示出较为明显的风险结构，这些结构在关系深入后可能对伴侣造成持续性的心理影响，同时也可能让你自己陷入关系的反复循环中——每段关系似乎都走向同样的结局，或者在关系中反复经历某些强烈但令自己不舒服的感受。</p>
      <p>这个分数段的人往往有较强的内部矛盾：一方面渴望真正的亲密，另一方面又在亲密真正到来的时候感到威胁、后退、或者转化为控制和攻击。这种矛盾不是性格缺陷，而是早期依恋经验和羞耻动力学共同作用的结果。</p>
      <p>重要的是：这些模式不是"你这个人"，它们是你早年发展出来的生存策略。它们曾经有用，但现在可能正在阻止你获得你真正渴望的亲密。改变是可能的，但它需要结构性的支持——不只是"想清楚"，而是在安全的容器里真正重新体验和整合那些早年未完成的部分。</p>
      <p>请认真考虑寻求长期的心理咨询支持，这不是"最后手段"，而是对自己和你爱的人最负责任的选择。</p>
    `;
  } else {
    html = `
      <p><strong style="color:var(--cream)">综合指数 81–100：高风险结构 / 深度工作紧迫期</strong></p>
      <p>你的测评结果显示出多个维度的高风险信号集中叠加。这意味着你在亲密关系中面临的挑战不只是"某个习惯需要改变"，而是涉及更深层的人格结构和依恋模式。</p>
      <p>这个结构下的人在关系中往往会经历以下一种或多种：对伴侣造成持续性的心理伤害（即使这不是你的本意）；或者反复成为受害者（因为"熟悉的痛苦"比"陌生的平静"更能激活你的内部工作模型）；或者两者交替出现。这是弗洛伊德所说的"强迫性重复"的典型形态。</p>
      <p>这个结果不是判决，而是一面镜子。很多有类似结构的人，通过持续的专业工作，能够真正重建自己的内在模型，进入不同质地的关系。这需要时间，需要一个足够安全的治疗空间，以及你真正愿意让自己被看见的勇气。</p>
      <p>如果你目前正在一段关系中，请认真评估这段关系对双方的影响。如果你正在考虑进入一段新的关系，建议先给自己一段专注于内在工作的时间。你值得一段不需要用旧的模式去维系的关系，但它需要你先做一些自己的工作。</p>
    `;
  }

  document.getElementById('conclusionBox').innerHTML = html;
}
</script>
